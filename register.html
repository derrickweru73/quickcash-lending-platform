<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | QuickCash</title>
             <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- Navigation Bar -->
         <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between ">
            <a href="index.html" class="bg-white text-blue-700 px-3 py-1 rounded-md font-semibold hover:text-gray-200">Home</a>
            <a href="login.html" class="bg-white text-blue-700 px-3 py-1 rounded-md font-semibold  hover:bg-gray-200">Sign In instead</a>
        </div>
    </nav>

    <!-- Main Registration Card Container -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 w-full max-w-lg">
            
            <!-- Header Text -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black tracking-tight text-blue-700">Get Started</h1>
                <p class="text-blue-700 mt-2">Create your QuickCash account to check your loan eligibility.</p>
            </div>

            <!-- Form Element   -->
            <form action="login.html" method="GET" class="space-y-5">
                
                <!-- Full Name Field -->
                <div>
                    <label for="fullname" class="block text-sm font-semibold text-blue-700 mb-1.5">Legal Full Name</label>
                    <input type="text" id="fullname" name="fullname" required placeholder  
                        class="w-full px-4 py-3 rounded-xl border border-D focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition placeholder:text-green-400">
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-blue-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200   focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition placeholder:text-green-400">
                </div>

                <!-- Phone Number Field -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-blue-700 mb-1.5">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200   focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition placeholder:text-green-400">
                </div>
a
                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-blue-700 mb-1.5">Create Password</label>
                    <input type="password" id="password" name="password" required placeholder
                        class="w-full px-4 py-3 rounded-xl border border-slate-200   focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition placeholder:text-green-400">
                    <p class="text-xs text-slate-400 mt-1">Must be at least 8 characters long.</p>
                </div>

                <!-- Terms and Conditions Checkbox -->
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input id="terms" name="terms" type="checkbox" required 
                            class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="terms" class="text-blue-700">I agree to the <a href="#" class="text-blue-700 hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>.</label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-indigo-100 tracking-wide mt-2">
                    Create Free Account
                </button>
            </form>

            <!-- Bottom Multi-Page Link Switcher -->
            <div class="text-center mt-6 pt-6 border-t border-slate-100">
                <p class="text-sm text-blue-700">
                    Already have an account? 
                     
            </div>

        </div>
    </main>

    

</body>
</html>
