<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCash Lending Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
             

</head>
<body class="h-full text-slate-800 antialiased font-sans">

     <!-- PLATFORM MAIN CONTAINER -->
    <!-- The structure uses a reverse order in HTML so CSS sibling selectors (~) work perfectly -->
    <div class="min-h-full flex flex-col md:flex-row">
         
         <!-- SIDEBAR NAVIGATION -->
        <aside class="w-full md:w-64 bg-purple-900 text-slate-400 flex flex-col border-r border-slate-800 shrink-0">
            <!-- Brand Logo -->
            <div class="p-6 text-emerald-400 font-black text-2xl tracking-tight border-b border-slate-800">
                QuickCash<span class="text-white">KES</span>
            </div>

        <!-- Navigation Links -->
            <nav class="flex-1 p-4 space-y-1">
                <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-white font-medium hover:bg-slate-800 transition-colors">
                     
                    <span>Overview</span>
                </a>
                <a href="#loan.html-page" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white-400 transition-colors">
                     <span></span>
                    <span>Apply for Loan</span>
                </a>
            </nav>
        </aside>

        <!-- CONTENT AREA WRAPPER -->
        <div class="flex-1 flex flex-col min-w-0">

        <!-- TOP APP BAR -->
            <header class="bg-white-900 border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm shrink-0">
                <div class="text-sm font-medium text-white-600">Account:Holder </div>
                <div class="h-8 w-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold text-sm">Name</div>
            </header>

            

            <!-- VIEW 2: MAIN DASHBOARD OVERVIEW -->
            <main id="dashboard-page" class="flex-col p-6 md:p-10 max-w-7xl w-full mx-auto space-y-8">
                <!-- Welcome Header & Navigation Button -->
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
                        <p class="text-sm text-slate-500 mt-1">Track your loans and limits in real-time.</p>
                    </div>
                    <div>
                         <a href="loan.html">
                           <button class="bg-green-400 text-white px-6 py-3 rounded-lg hover:bg-green-500">
                             Request New Loan
                     </button>
                     </a>
                    </div>
                </div>

            <!--  Grid Cards -->
                <section class="grid grid-cols-1 gap-5 sm:grid-cols-3">
                    <div class="bg-white shadow-sm rounded-xl border border-slate-200 p-6">
                        <dt class="text-sm font-medium text-slate-500 truncate">Total Balance Due</dt>
                        <dd class="mt-1 text-3xl font-semibold text-slate-900">KES 45,000</dd>
                    </div>
                    <div class="bg-white shadow-sm rounded-xl border border-slate-200 p-6">
                        <dt class="text-sm font-medium text-slate-500 truncate">Next Due Date</dt>
                        <dd class="mt-1 text-3xl font-semibold text-amber-600">June 05, 2026</dd>
                    </div>
                    <div class="bg-white shadow-sm rounded-xl border border-slate-200 p-6">
                        <dt class="text-sm font-medium text-slate-500 truncate">Available Limit</dt>
                        <dd class="mt-1 text-3xl font-semibold text-emerald-600">KES 120,000</dd>
                    </div>
                </section>

                <!-- Transactions Summary Table -->
                <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100">
                        <h3 class="text-base font-semibold text-slate-900">Recent Applications</h3>
                    </div>
                    <ul role="list" class="divide-y divide-slate-100">
                        <li class="flex items-center justify-between p-6">
                            <div>
                                <p class="text-sm font-semibold text-slate-900">Business Growth Loan</p>
                                <p class="text-xs text-slate-500 mt-0.5">Submitted: May 24, 2026</p>
                            </div>
                            <div class="flex items-center gap-x-4">
                                <span class="text-sm font-medium text-slate-900">KES 50,000</span>
                                <span class="px-2 py-1 text-xs font-medium bg-amber-50 text-amber-800 rounded border border-amber-200">Pending</span>
                            </div>
                        </li>
                    </ul>
                </section>
            </main>

        </div>
    </div>
    <a href="login.html">
  <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
    Return to Login
  </button>
</a>
</body>
</html>
