<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact support | QuickCash Lending Platform</title>
                <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <!--Navigation bar-->
    <header class="bg-white shadow-xs sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
             <a href="index.html" class="text-2xl font-bold text-emerald-600 tracking-tight">Quick<span class="text-slate-900">Cash</span></a>
             <nav class="hidden md:flex space-x-8 font-medium text-slate-600">
                <a href="index.html" class="hover:text-emerald-600 transition">Home</a>
                 
                <a href="faq.html" class="hover:text-emerald-600 transition">FAQs</a>
            </nav>
         </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12 md:py-20">
        
        <!-- Header Introduction -->
        <div class="text-center max-w-2xl mx-auto mb-16">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">We are Here to Help</h1>
            <p class="text-slate-600 mt-3 text-base md:text-lg">Have questions about your loan application, repayments, or account security? Reach out to our dedicated support team.</p>
            <p class="mt-4 bg-emerald-50 text-emerald-700 inline-block px-4 py-1.5 rounded-full text-xs font-semibold border border-emerald-100">
                 Quick tip: Check out our <a href="faq.html" class="underline font-bold hover:text-emerald-800">FAQs</a> first to get instant answers.
            </p>
        </div>
        <!-- Main Content Grid -->
<div class="grid lg:grid-cols-3 gap-12 items-start">
    
    <!-- Column 1 & 2: Contact Form without Container Box -->
     <main> 
    <div class="lg:col-span-2 p-0">
        <h2 class="text-2xl font-bold text-slate-900 mb-6">Send Us a Message</h2>
        
        <form action="#" method="POST" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Full Name -->
                <div>
                    <label for="name" class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-3 bg-white rounded-lg border border-slate-200 focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition text-sm" placeholder>
                </div>
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-3 bg-white rounded-lg border border-slate-200 focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition text-sm" placeholder>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Phone Number -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="w-full px-4 py-3 bg-white rounded-lg border border-slate-200 focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition text-sm" placeholder>
                </div>
                <!-- Dropdown -->
                <div>
                    <label for="subject" class="block text-sm font-semibold text-slate-700 mb-2">What can we help with?</label>
                    <select id="subject" name="subject" required class="w-full px-4 py-3 bg-white rounded-lg border border-slate-200 focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition text-sm">
                        <option value="general">General Inquiry</option>
                        <option value="application">Loan Application Status</option>
                        <option value="repayment">Repayment & Billing</option>
                    </select>
                </div>
            </div>

            <!-- Message -->
            <div>
                <label for="message" class="block text-sm font-semibold text-slate-700 mb-2">Your Message</label>
                <textarea id="message" name="message" rows="5" required class="w-full px-4 py-3 bg-white rounded-lg border border-slate-200 focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition text-sm resize-none" placeholder="Provide details..."></textarea>
            </div>

            <div class="space-y-6">
                        <!-- Support Email -->
                        <div class="flex items-start gap-4">
                            <div class="p-2.5 bg-slate-800 rounded-lg text-emerald-400 shrink-0">
                             </div>
                            <div>
                                <p class="text-xs text-slate-400 font-medium">Email Address</p>
                                <a href="mailto:support@quickcash.com" class="text-sm font-bold text-black hover:text-emerald-400 transition">support@quickcash.com</a>
                            </div>
                        </div>


            <!-- Submit Button -->
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-lg transition shadow-sm cursor-pointer">Submit Support</button>
        </form>
    </div>
    </main>

 </button>
  <a href="about.html">
  <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
    About Us
  </button>

 </div>
</body>
</html>
