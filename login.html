<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | QuickCash</title>
                 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

 </head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- Navigation Bar -->
    
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between ">
            <a href="index.html" class="bg-white text-blue-700 px-3 py-1 rounded-md font-semibold hover:text-gray-200">Home</a>
            <a href="register.html" class="bg-white text-blue-700 px-3 py-1 rounded-md font-semibold  hover:bg-gray-200">Create Account</a>
        </div>
    </nav>

    <!-- Main Login   -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 w-full max-w-md">
            
            <!-- Header Text -->
            <div class="bg-blue-700 rounded-xl px-3 py-3">
                <h1 class="bg-blue-700 text-white px-3 py-1 font-semibold hover:text-yellow-300">Welcome Back</h1>
                <p class="text-white mt-2">Sign in to access your dashboard and active loans.</p>
            </div>

            <!-- Form Element  -->
            <form action="dashboard.html" method="GET" class="space-y-5">
                
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-blue-700 mb-1.5">Email Address</label>
               <input type="email" id="email" name="email" required placeholder="you@example.com" 
                        class="w-full px-4 py-3 rounded-xl border border-blue-700  e focus:border-green-indigo focus:ring-2 focus:ring-indigo-100 transition placeholder:text-blue-700">
                </div>

                <!-- Password Input -->
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-sm font-semibold text-blue-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-700 hover:underline">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" name="password" required placeholder 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200   focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition placeholder:text-blue-700">
                </div>

                <!-- Remember Me Checkbox -->
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    <label for="remember-me" class="ml-2 text-sm text-blue-700 cursor-pointer select-none">Remember this device</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-indigo-100 tracking-wide mt-2">
                    Secure Login →
                </button>
            </form>

            <!-- Switcher to Registration Page -->
            <div class="text-center mt-6 pt-6 border-t border-slate-100">
                <p class="text-sm text-blue-700">
                    New to QuickCash? 
                    <a href="register.html" class="text-blue-700 font-bold hover:underline ml-1">Create an account</a>
                </p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 text-center text-xs text-slate-400 border-t border-slate-200 bg-white">
        &copy; 2026 QuickCash Lending Platform.  
    </footer>

</body>
</html>
